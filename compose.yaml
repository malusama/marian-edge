services:
  marian-edge:
    image: "${MARIAN_EDGE_IMAGE:-ghcr.io/malusama/marian-edge:cpu}"
    build:
      context: .
    ports:
      - "127.0.0.1:${MARIAN_EDGE_HOST_PORT:-3000}:3000"
    environment:
      MARIAN_EDGE_CPU_THREADS: "${MARIAN_EDGE_CPU_THREADS:-1}"
    volumes:
      - marian-edge-models:/models
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/readyz"]
      interval: 10s
      timeout: 3s
      start_period: 120s
      retries: 6

volumes:
  marian-edge-models:
