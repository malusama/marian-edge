name: Bug report
description: Report reproducible translation, runtime, or deployment behavior
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not report security vulnerabilities here; use SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or image digest
    validations:
      required: true
  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options: [MLX / Metal, Bergamot / CPU, API-only development]
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment and `/info` output
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the request, expected result, actual result, and logs without private text.
    validations:
      required: true
