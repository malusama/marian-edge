name: Publish CPU container

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push native architecture
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ env.IMAGE }}:build-${{ github.sha }}-${{ matrix.arch }}
          build-args: |
            VERSION=${{ github.ref_name }}
            VCS_REF=${{ github.sha }}
          cache-from: type=gha,scope=cpu-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=cpu-${{ matrix.arch }}

  manifest:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge multi-architecture manifest
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          tags=(--tag "$IMAGE:cpu")
          if [[ "$GITHUB_REF_TYPE" == tag ]]; then
            tags+=(--tag "$IMAGE:cpu-$version")
          fi
          docker buildx imagetools create "${tags[@]}" \
            "$IMAGE:build-$GITHUB_SHA-amd64" \
            "$IMAGE:build-$GITHUB_SHA-arm64"
          docker buildx imagetools inspect "$IMAGE:cpu"
