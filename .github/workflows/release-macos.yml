name: Release macOS

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Rust toolchain
        run: rustup show active-toolchain
      - name: Portable release gates
        run: make check
      - name: Native Metal and CPU unit gates
        run: |
          cargo clippy --locked -p marian-metal --all-targets --features metal -- -D warnings
          cargo clippy --locked -p marian-server --all-targets --features metal,cpu -- -D warnings
          cargo test --locked -p marian-metal --features metal --lib
          cargo test --locked -p marian-server --features metal,cpu
          python3 tools/test_summarize_metal_trace.py
      - name: Check tag version
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          WORKSPACE_VERSION=$(awk '
            /^\[workspace.package\]$/ {inside = 1; next}
            /^\[/ {inside = 0}
            inside && /^version = / {
              gsub(/^[^"]*"|".*$/, "")
              print
              exit
            }
          ' Cargo.toml)
          test -n "$WORKSPACE_VERSION"
          test "$TAG_VERSION" = "$WORKSPACE_VERSION"
          awk -v version="$TAG_VERSION" '
            index($0, "## [" version "]") == 1 { found = 1 }
            found && /^## \[/ && index($0, "## [" version "]") != 1 { exit }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          test -s /tmp/release-notes.md
      - name: Build release archive
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION=${VERSION#v}
          export VERSION
          scripts/package-macos.sh
          cp scripts/install-macos.sh dist/install-macos.sh
          (cd dist && shasum -a 256 install-macos.sh >> SHA256SUMS)
      - name: Attest runtime archive
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/marian-edge-macos-arm64.tar.gz
      - name: Attest installer
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/install-macos.sh
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "release $GITHUB_REF_NAME already exists; refusing to replace immutable assets" >&2
            exit 1
          fi
          gh release create "$GITHUB_REF_NAME" --verify-tag \
            --title "$GITHUB_REF_NAME" --notes-file /tmp/release-notes.md \
            dist/marian-edge-macos-arm64.tar.gz \
            dist/SHA256SUMS \
            dist/install-macos.sh
